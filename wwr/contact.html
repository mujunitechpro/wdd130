<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Z-Rapids Rafting</title>
    <meta name="description" content="Welcome to Our contact us page. Please go through it clearly and for more information  please visit our social media platforms">
    <meta name="author" content="Baraka Gosbert Mujuni">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/z-rapids-trees.jpg" alt="Rafting Company logo" class="logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="company-info">
            <h1>Z-Rapids Rafting Company</h1>
            <p>500B, Kagera Road</p>
            <p>Kagera, Tanzania</p>
            <p>+255 713 810</p>
            <p><a href="mailto:gozbertbaraka9@gmail.com">gozbertbaraka9@gmail.com</a></p>
        </div>

        <div class="contact-grid">

            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d608613.5534982015!2d31.138844430388662!3d-2.1867556315440257!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2stz!4v1775334394894!5m2!1sen!2stz"
                  allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>

            <form action="#" method="post">

                <div class="form-group">
                    <label for="username">Name</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="useremail">Email</label>
                    <input type="email" id="useremail" name="useremail" required>
                </div>

                <div class="form-group">
                    <label>Message Purpose</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" id="general-inquiry" name="purpose" value="general-inquiry" required>
                            General Inquiry
                        </label>
                        <label>
                            <input type="radio" id="reservation-question" name="purpose" value="reservation-question">
                            Reservation Question
                        </label>
                        <label>
                            <input type="radio" id="website-suggestion" name="purpose" value="website-suggestion">
                            Website Suggestion
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Type here"></textarea>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="newsletter" name="newsletter" value="subscribe">
                    <label for="newsletter">Please Subscribe me to the monthly newsletter</label>
                </div>

                <button type="submit">Get in Touch!</button>

            </form>

        </div>

        <section class="employee profile">
            <h2>We Are Here to Serve You</h2>
            <div class="employee-gallery">
                <figure>
                    <img src="images/employee1.jpg" alt="Raft Team Leader">
                    <figcaption>Raft Team Leader</figcaption>
                </figure>
                <figure>
                    <img src="images/employee2.jpg" alt="Staff Manager">
                    <figcaption>Staff Manager</figcaption>
                </figure>
                <figure>
                    <img src="images/employee3.jpg" alt="Welfare Manager">
                    <figcaption>Welfare Manager</figcaption>
                </figure>
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 | Z-Rapids Rafting! | Baraka Gosbert Mujuni</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.svg" alt="Facebook Icon"></a>
            <a href="https://linkedin.com"><img src="images/linkedin.svg" alt="LinkedIn Icon"></a>
            <a href="https://instagram.com"><img src="images/instagram.png"
                  alt="Instagram Icon"></a>
        </nav>
    </footer>

</body>

</html>
